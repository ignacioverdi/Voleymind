<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scouting Rival — Nafels Voley</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07080F;--card:#0d0e1a;--card2:#111324;--border:rgba(255,255,255,.07);
    --txt:#e2e8f0;--mut:#64748b;--mut2:#94a3b8;
    --red:#e8192c;--saque:#F59E0B;--ataque:#F97316;--recep:#22C55E;--armado:#818CF8;--defensa:#EF4444;--cyan:#06B6D4;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--txt);font-family:'Barlow Condensed',sans-serif;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(1200px 600px at 80% -10%,rgba(232,25,44,.06),transparent 60%),radial-gradient(900px 500px at -10% 110%,rgba(129,140,248,.05),transparent 60%);pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1}

  .header-right{position:fixed;top:10px;right:10px;z-index:99998;display:flex;align-items:center;gap:6px}
  #lang-wrap{display:flex;gap:4px}

  .hdr{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:12px 210px 12px 22px;background:rgba(7,8,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
  @media(max-width:760px){.hdr{padding-right:22px}}
  .back-btn{padding:6px 13px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--mut2);font-size:11px;font-weight:700;letter-spacing:1px;text-decoration:none;text-transform:uppercase;white-space:nowrap}
  .back-btn:hover{border-color:rgba(255,255,255,.2);color:#fff}
  .hdr-t{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;line-height:1}
  .hdr-t span{color:var(--red)}
  .hdr-s{font-size:10px;color:var(--mut);letter-spacing:2px;text-transform:uppercase}

  .teamsel{display:flex;gap:8px;flex-wrap:wrap;padding:18px 22px 4px}
  .tbtn{padding:9px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--mut2);
    font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;cursor:pointer;
    transition:all .15s;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .tbtn:hover{border-color:rgba(255,255,255,.22);transform:translateY(-1px)}
  .tbtn.on{border-color:var(--red);background:rgba(232,25,44,.12);color:#fff;box-shadow:0 4px 18px rgba(232,25,44,.18)}
  .tbtn .mc{font-size:10px;color:var(--mut);font-weight:600}
  .tbtn.on .mc{color:#fca5a5}

  .dossier{padding:14px 22px 60px;max-width:1280px;margin:0 auto}
  .empty-st{padding:80px 20px;text-align:center;color:var(--mut)}
  .empty-st .big{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:3px;color:#1e293b;margin-bottom:8px}

  .dteam{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin:8px 0 18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .dteam-act{display:flex;gap:8px;flex-wrap:wrap}
  .dact{text-decoration:none;background:var(--card2);border:1px solid var(--border);color:var(--mut2);border-radius:9px;padding:8px 13px;font-weight:700;font-size:13px;white-space:nowrap}
  .dact:hover{border-color:var(--ataque);color:#fff}
  @media print{.dteam-act{display:none!important}}
  .dteam-name{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:2px;line-height:.95}
  .dteam-sub{font-size:12px;color:var(--mut2);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
  .dteam-sub b{color:var(--red)}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(max-width:880px){.grid{grid-template-columns:1fr}}
  .sec{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .sec-hd{display:flex;align-items:center;gap:9px;padding:13px 18px;border-bottom:1px solid var(--border)}
  .sec-ic{font-size:17px}
  .sec-ti{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}
  .sec-bd{padding:16px 18px}

  .kpis{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .kpi{flex:1;min-width:74px;background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:11px 8px;text-align:center}
  .kpi .v{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1}
  .kpi .l{font-size:9px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}

  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
  .bar-lb{font-size:12px;font-weight:700;width:60px;letter-spacing:.5px;color:var(--mut2);flex-shrink:0}
  .bar-tr{flex:1;height:9px;background:rgba(255,255,255,.04);border-radius:6px;overflow:hidden}
  .bar-fl{height:100%;border-radius:6px;transition:width .4s}
  .bar-vl{font-size:11px;font-weight:800;width:54px;text-align:right;flex-shrink:0}

  table{width:100%;border-collapse:collapse}
  th{font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;text-align:right;padding:6px 8px;border-bottom:1px solid var(--border)}
  th:first-child{text-align:left}
  td{font-size:13px;padding:8px;text-align:right;border-bottom:1px solid rgba(255,255,255,.03)}
  td:first-child{text-align:left;font-weight:700}
  tr:last-child td{border-bottom:none}
  .star{color:var(--ataque)}
  .posbadge{font-size:10px;font-weight:800;letter-spacing:.5px;padding:2px 8px;border-radius:6px;text-transform:uppercase}
  .pb-pu{background:rgba(34,197,94,.15);color:#4ade80}
  .pb-op{background:rgba(239,68,68,.15);color:#f87171}
  .pb-ce{background:rgba(6,182,212,.15);color:#22d3ee}
  .pb-x{background:rgba(148,163,184,.12);color:#94a3b8}
  .rotgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(172px,1fr));gap:10px}
  .rotcard{background:var(--card2);border:1px solid var(--border);border-radius:13px;padding:12px 13px}
  .rothd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;min-height:24px}
  .rotnum{font-family:'Bebas Neue',sans-serif;font-size:23px;letter-spacing:2px;color:#f472b6}
  .rottag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.5px}
  .rotso{font-size:12px;color:var(--mut2);margin-bottom:8px}
  .rotlb{font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin:8px 0 3px}
  .rotfr{font-size:13px;font-weight:700;color:var(--txt)}
  .rotdist{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}

  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:7px 11px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px}
  .chip b{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px}
  .chip .p{font-size:11px;font-weight:800}

  .court{width:100%;max-width:230px;margin:6px auto 0;display:block}

  .claves{margin-top:16px;background:linear-gradient(135deg,rgba(232,25,44,.08),rgba(129,140,248,.06));border:1px solid rgba(232,25,44,.25);border-radius:16px;padding:16px 18px}
  .claves-hd{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff;display:flex;align-items:center;gap:9px;margin-bottom:12px}
  .clave{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px;line-height:1.45}
  .clave:last-child{border-bottom:none}
  .clave .cn{flex-shrink:0;width:22px;height:22px;border-radius:7px;background:var(--red);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:13px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .clave b{color:#fff}.clave .hl{color:var(--ataque);font-weight:800}.clave .hl2{color:var(--armado);font-weight:800}.clave .hl3{color:var(--recep);font-weight:800}
  .sysgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:620px){.sysgrid{grid-template-columns:1fr}}
  .syscol{background:var(--card2);border:1px solid var(--border);border-radius:13px;padding:13px 14px}
  .syshd{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.5px;margin-bottom:4px}
  .sysk{font-size:12px;color:var(--mut2);margin-bottom:4px}
  .sysk b{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
  .sysbar{display:grid;grid-template-columns:84px 1fr 34px;align-items:center;gap:8px;margin:4px 0;font-size:12px;font-weight:700}
  .sysbar .sysp{height:8px;border-radius:5px;background:#1e2944;overflow:hidden}
  .sysbar .sysp i{display:block;height:100%;border-radius:5px}
  .sysbar .sysv{text-align:right;color:var(--mut2);font-weight:800}
  .syscombos{display:flex;flex-wrap:wrap;gap:5px}
  .syscombos .chip2{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:3px 8px;font-size:11px;font-weight:700;color:var(--mut2)}
  .sysnote{margin-top:11px;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);border-radius:10px;padding:11px 13px;font-size:13px;line-height:1.55;color:var(--mut2)}
  .printbtn{background:transparent;border:1px solid var(--border);color:var(--mut2);border-radius:8px;padding:7px 12px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;margin-right:8px}
  .printbtn:hover{border-color:var(--ataque);color:#fff}
  @media print{
    body{background:#fff}
    .header-right,.back-btn,.teamsel,.printbtn,#lang-wrap{display:none!important}
    .sec,.syscol,.rotcard,.claves,.kpi,table{break-inside:avoid;page-break-inside:avoid}
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  }
  .atktabs{display:flex;gap:6px;margin-bottom:13px;flex-wrap:wrap}
  .atktab{background:var(--card2);border:1px solid var(--border);color:var(--mut2);border-radius:9px;padding:8px 14px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s}
  .atktab:hover{color:#fff}
  .atktab.on{background:rgba(249,115,22,.14);border-color:rgba(249,115,22,.5);color:var(--ataque)}
</style>
</head>
<body>
<div class="wrap">
<div class="header-right"><button class="printbtn" onclick="window.print()">🖨 Imprimir / PDF</button><div id="lang-wrap"></div></div>

<div class="hdr">
  <a href="dashboard.html" class="back-btn">← Dashboard</a>
  <div>
    <div class="hdr-t">SCOUTING <span>RIVAL</span></div>
    <div class="hdr-s">Dossier del próximo rival · NLA Suiza</div>
  </div>
</div>

<div class="teamsel" id="teamsel"></div>
<div class="dossier" id="dossier">
  <div class="empty-st"><div class="big">ELEGÍ UN RIVAL</div><div>Seleccioná un equipo arriba para ver su dossier completo de scouting.</div></div>
</div>
</div>

<script src="scouting_rival.js" onerror="void 0"></script>
<script>
var SC = window.SCOUTING_RIVAL || {};
var CUR = null;

// === colores / helpers ===
function effColor(v){ return v>=35?'#22c55e':v>=25?'#84cc16':v>=15?'#fbbf24':v>=5?'#f97316':'#ef4444'; }
function pctColor(v){ return v>=55?'#22c55e':v>=40?'#fbbf24':v>=25?'#f97316':'#ef4444'; }
function ZN(z){ return 'Z'+z; }

// === selector de equipos (ordenados por partidos, mínimo 5) ===
function buildTeams(){
  var names = Object.keys(SC).filter(function(n){return SC[n].matches>=5;})
    .sort(function(a,b){return SC[b].matches-SC[a].matches;});
  var ts = document.getElementById('teamsel');
  ts.innerHTML='';
  names.forEach(function(n){
    var b=document.createElement('button');
    b.className='tbtn';
    b.innerHTML='<span>'+n+'</span><span class="mc">'+SC[n].matches+' P</span>';
    b.onclick=function(){ selectTeam(n,b); };
    ts.appendChild(b);
  });
}
function selectTeam(n,btn){
  CUR=n;
  document.querySelectorAll('.tbtn').forEach(function(x){x.classList.remove('on');});
  if(btn) btn.classList.add('on');
  renderDossier(n);
}

// === barra horizontal ===
function bar(label,pct,color,valTxt){
  return '<div class="bar-row"><div class="bar-lb">'+label+'</div>'
    +'<div class="bar-tr"><div class="bar-fl" style="width:'+Math.min(100,pct)+'%;background:'+color+'"></div></div>'
    +'<div class="bar-vl" style="color:'+color+'">'+(valTxt||pct+'%')+'</div></div>';
}

// === mini cancha de zonas de ataque (dónde caen sus ataques) ===
function courtZones(zones){
  // layout estándar de zonas en la cancha que defendemos
  var grid=[[4,3,2],[7,8,9],[5,6,1]];
  var map={}; zones.forEach(function(z){ map[z.k]=z.pct; });
  var max=Math.max.apply(null,zones.map(function(z){return z.pct;}).concat([1]));
  var W=230,H=150,cw=W/3,ch=H/3, svg='<svg class="court" viewBox="0 0 '+W+' '+H+'">';
  svg+='<rect x="1" y="1" width="'+(W-2)+'" height="'+(H-2)+'" rx="6" fill="rgba(249,115,22,.04)" stroke="rgba(255,255,255,.12)"/>';
  for(var r=0;r<3;r++)for(var c=0;c<3;c++){
    var z=grid[r][c], p=map[z]||0, op=p/max*0.85;
    var x=c*cw, y=r*ch;
    svg+='<rect x="'+(x+2)+'" y="'+(y+2)+'" width="'+(cw-4)+'" height="'+(ch-4)+'" rx="4" fill="rgba(249,115,22,'+op.toFixed(2)+')" stroke="rgba(255,255,255,.06)"/>';
    svg+='<text x="'+(x+cw/2)+'" y="'+(y+ch/2-3)+'" text-anchor="middle" font-family="Bebas Neue" font-size="15" fill="'+(p>0?'#fff':'#334155')+'">'+z+'</text>';
    if(p>0) svg+='<text x="'+(x+cw/2)+'" y="'+(y+ch/2+13)+'" text-anchor="middle" font-size="10" font-weight="700" fill="#fdba74">'+p+'%</text>';
  }
  svg+='<line x1="0" y1="2" x2="'+W+'" y2="2" stroke="#e8192c" stroke-width="3"/>';
  svg+='</svg><div style="text-align:center;font-size:9px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-top:4px">Destino de sus ataques</div>';
  return svg;
}

// === claves del partido (insights automáticos) ===
function posClass(p){ return p==='Opuesto'?'pb-op':p==='Central'?'pb-ce':p==='Punta'?'pb-pu':'pb-x'; }
function renderRotations(t){
  var all=(t.rotations||[]);
  var order=[1,6,5,4,3,2];   // orden real de rotación
  var rots=order.map(function(rn){return all[rn-1];}).filter(function(r){return r;});
  if(!rots.length) return '';
  var withSO=rots.filter(function(r){return r.so_eff!=null;});
  // prioridad de saque: más flojo en side-out = 1ª prioridad
  var ranked=withSO.slice().sort(function(a,b){return a.so_eff-b.so_eff;});
  var prio={}; ranked.forEach(function(r,i){prio[r.r]=i+1;});
  var h='<div class="sec" style="grid-column:1/-1"><div class="sec-hd"><span class="sec-ic">🔄</span><span class="sec-ti" style="color:#f472b6">Por rotación — prioridad de saque (orden P1·P6·P5·P4·P3·P2)</span></div><div class="sec-bd">';
  h+='<div class="rotgrid">';
  rots.forEach(function(r){
    var p=prio[r.r]||null;
    var pCol=!p?'#475569':p<=2?'#f87171':p<=4?'#fbbf24':'#4ade80';
    var pLbl=!p?'':(p===1?'🎯 1ª · sacar acá':p+'ª prioridad');
    var soTxt=r.so_eff!=null?r.so_eff+'%':'—';
    var soCol=r.so_eff!=null?effColor(r.so_eff):'#475569';
    var bd=p===1?'border-color:rgba(239,68,68,.5)':p===ranked.length?'border-color:rgba(34,197,94,.35)':'';
    h+='<div class="rotcard" style="'+bd+'">';
    h+='<div class="rothd"><span class="rotnum">P'+r.r+'</span>'
      +(pLbl?'<span class="rottag" style="background:'+pCol+'22;color:'+pCol+'">'+pLbl+'</span>':'')+'</div>';
    h+='<div class="rotso">Side-out <b style="color:'+soCol+'">'+soTxt+'</b> · eff ataque '+r.eff+'%</div>';
    h+='<div class="rotlb">En red</div><div class="rotfr">'+(r.front||[]).join(' · ')+'</div>';
    h+='<div class="rotlb">Armador distribuye a</div>';
    (r.dist||[]).forEach(function(d){ h+='<div class="rotdist"><span>'+d.name+'</span><span style="color:#f472b6;font-weight:800">'+d.pct+'%</span></div>'; });
    h+='</div>';
  });
  h+='</div>';
  h+='<div style="font-size:10px;color:var(--mut);margin-top:10px;line-height:1.5">Orden de rotación real: <b style="color:var(--mut2)">P1·P6·P5·P4·P3·P2</b> (P = zona del armador). La <b style="color:#f87171">prioridad de saque</b> ordena las 6 rotaciones de la más floja en side-out (1ª) a la más fuerte: apretá el saque en las primeras. "En red" = sus 3 jugadores en zona de ataque.</div>';
  h+='</div></div>';
  return h;
}
function renderSistema(t){
  var s=t.sistema; if(!s||(!s.insys.n && !s.outsys.n)) return '';
  var inn=s.insys, out=s.outsys;
  function col(title,c0,b){
    var h='<div class="syscol"><div class="syshd" style="color:'+c0+'">'+title+'</div>';
    h+='<div class="sysk"><b style="color:'+effColor(b.eff)+'">'+b.eff+'%</b> rendimiento · '+b.n+' ataques</div>';
    h+='<div class="rotlb">A quién va</div>';
    (b.dist||[]).forEach(function(d){
      h+='<div class="sysbar"><span>'+d.name+'</span><span class="sysp"><i style="width:'+Math.min(100,d.pct)+'%;background:'+c0+'"></i></span><span class="sysv">'+d.pct+'%</span></div>';
    });
    h+='<div class="rotlb" style="margin-top:7px">Pelotas</div><div class="syscombos">';
    (b.combos||[]).forEach(function(c){ h+='<span class="chip2">'+c.k+' '+c.pct+'%</span>'; });
    h+='</div></div>';
    return h;
  }
  var h='<div class="sec" style="grid-column:1/-1"><div class="sec-hd"><span class="sec-ic">🎯</span><span class="sec-ti" style="color:var(--ataque)">En sistema vs fuera de sistema — qué pasa si les rompés la recepción</span></div><div class="sec-bd">';
  h+='<div class="sysgrid">';
  h+=col('🟢 EN SISTEMA','#22c55e',inn);
  h+=col('🔴 FUERA DE SISTEMA','#ef4444',out);
  h+='</div>';
  var drop=(inn.n&&out.n)?(inn.eff-out.eff):null;
  if(drop!=null && drop>=8){
    var top2=(out.dist||[]).slice(0,2);
    var names=top2.map(function(d){return d.name;}).join(' + ');
    var sumpct=top2.reduce(function(a,d){return a+d.pct;},0);
    h+='<div class="sysnote">Rompiéndoles la recepción, su eficacia cae <b style="color:#f87171">'+drop+' puntos</b> ('+inn.eff+'% → '+out.eff+'%) y el ataque se concentra en <b style="color:#fff">'+names+'</b> (~'+sumpct+'% entre los dos), casi todo pelota alta. <b>Sacar fuerte y cargar el bloqueo a ellos.</b></div>';
  }
  h+='<div style="font-size:10px;color:var(--mut);margin-top:9px;line-height:1.5">En sistema = recepción positiva (#/+), el armador tiene todas las opciones. Fuera de sistema = recepción rota (−//), el armador queda condicionado. Solo cuenta el ataque de side-out.</div>';
  h+='</div></div>';
  return h;
}
function buildClaves(t){
  var c=[];
  var ap=t.attack.players||[];
  function dirOf(p){
    return (p.combos||[]).slice(0,2).map(function(x){
      var d=(x.dest||[]).slice(0,1).map(function(z){return 'Z'+z.z;}).join('');
      return '<b>'+x.k+'</b> ('+x.pct+'%'+(d?' → '+d:'')+')';
    }).join(' y ');
  }
  function notaPos(p){
    if(p.pos==='Opuesto') return 'Bloqueo y defensa cargados por zona 2 y zaga derecha.';
    if(p.pos==='Central') return 'Lectura del primer tiempo.';
    if(p.pos==='Punta') return 'Bloqueo en zona 4, defensa de diagonal y paralela.';
    return '';
  }
  if(ap.length){
    var top=ap[0];
    c.push('Rematador principal: <span class="hl">'+top.name+'</span> (<b>'+top.pos+'</b>, '+top.matches+' PJ · '+top.tot+' bolas, eff <b>'+top.eff+'%</b>). Sus combinaciones: '+dirOf(top)+'. '+notaPos(top));
    if(ap[1]) c.push('Segunda opción: <span class="hl">'+ap[1].name+'</span> ('+ap[1].pos+', '+ap[1].tot+' bolas, eff '+ap[1].eff+'%): '+dirOf(ap[1])+'.');

  }
  h+='<div style="font-size:10px;color:var(--mut);margin-top:10px;line-height:1.6">★ = lo hizo en el último partido. <b style="color:#22c55e">EN ALZA</b> / <b style="color:#ef4444">EN BAJA</b> = su número de las últimas fechas cambió ±8 pts vs su promedio de temporada (▲▼). <b style="color:#f59e0b">NUEVO TITULAR</b> = está jugando aunque no era regular. <b style="color:#94a3b8">AUSENTE</b> = habitual que no jugó las últimas fechas (lesión/banco). Partido a partido: atenuado = poco volumen ese partido. /N = volumen.</div>';
  var out=document.getElementById('recentOut'); if(out) out.innerHTML=h;
}
var CUR_ROT='so';
function buildRotDist(t){
  if(!t.rotations) return '';
  var any=t.rotations.some(function(r){return r&&((r.dist_so&&r.dist_so.length)||(r.dist_tr&&r.dist_tr.length));});
  if(!any) return '';
  var btn=function(m,lbl){return '<button class="rdtab" data-m="'+m+'" onclick="renderRotDist(\''+m+'\')" style="font-family:Barlow Condensed,sans-serif;font-size:12px;letter-spacing:.5px;padding:6px 13px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--mut2);cursor:pointer;text-transform:uppercase">'+lbl+'</button>';};
  var h='<div class="sec"><div class="sec-hd"><span class="sec-ic">🔀</span><span class="sec-ti" style="color:var(--armado)">Distribución por rotación</span></div><div class="sec-bd">';
  h+='<div style="font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">A quién le arma en cada rotación</div>';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">'+btn('so','Side-out (rec #+)')+btn('tr','Transición')+'</div>';
  h+='<div id="rdOut"></div>';
  h+='<div style="font-size:10px;color:var(--mut);margin-top:8px;line-height:1.5">% = cuántas pelotas le da a cada rematador en esa rotación · (k%) = su eficacia ahí. Orden P1·P6·P5·P4·P3·P2.</div>';
  h+='</div></div>';
  return h;
}
function renderRotDist(mode){
  if(!CUR||!CUR.rotations) return; CUR_ROT=mode;
  document.querySelectorAll('.rdtab').forEach(function(b){
    var on=b.getAttribute('data-m')===mode;
    b.style.background=on?'rgba(129,140,248,.18)':'var(--card2)';
    b.style.color=on?'var(--armado)':'var(--mut2)';
    b.style.borderColor=on?'rgba(129,140,248,.45)':'var(--border)';
  });
  var key=mode==='tr'?'dist_tr':'dist_so', nkey=mode==='tr'?'dist_tr_n':'dist_so_n';
  var h='<div style="overflow-x:auto"><table style="width:100%"><thead><tr><th>Rot</th><th>Bolas</th><th style="text-align:left">A quién le arma — % (kill%)</th></tr></thead><tbody>';
  [1,6,5,4,3,2].forEach(function(r){
    var rot=CUR.rotations[r-1];
    if(!rot){ h+='<tr><td><b style="color:var(--armado)">P'+r+'</b></td><td colspan="2" style="color:var(--mut);text-align:left;font-size:11px">pocos datos</td></tr>'; return; }
    var d=rot[key]||[], n=rot[nkey]||0;
    var dd=d.length?d.map(function(x){return '<b>'+x.name+'</b> '+x.pct+'% <span style="color:var(--mut)">(k'+x.k+'%)</span>';}).join('<span style="color:var(--mut);opacity:.4"> · </span>'):'<span style="color:var(--mut);font-size:11px">pocos datos</span>';
    h+='<tr><td><b style="color:var(--armado);font-size:15px">P'+r+'</b></td><td style="color:var(--mut2)">'+n+'</td><td style="text-align:left;line-height:1.5">'+dd+'</td></tr>';
  });
  h+='</tbody></table></div>';
  var out=document.getElementById('rdOut'); if(out) out.innerHTML=h;
}
function renderDossier(n){
  var t=SC[n]; if(!t){return;}
  CUR=t;
  var d=document.getElementById('dossier');
  var h='';

  // header del equipo
  var enc=encodeURIComponent(n);
  h+='<div class="dteam"><div><div class="dteam-name">'+n+'</div>'
    +'<div class="dteam-sub"><b>'+t.matches+'</b> partidos analizados · scouting basado en datos reales</div></div>'
    +'<div class="dteam-act"><a href="plan_partido.html?equipo='+enc+'" class="dact">📋 Plan de partido</a>'
    +'<a href="comparador.html?equipo='+enc+'" class="dact">⚖ Comparar con Näfels</a></div></div>';

  h+='<div class="grid">';

  // ===== FORMA RECIENTE =====
  h+=buildRecentForm(t);

  // ===== SAQUE =====
  h+='<div class="sec" style="grid-column:1/-1"><div class="sec-hd"><span class="sec-ic">⚡</span><span class="sec-ti" style="color:var(--saque)">Saque — desde dónde y hacia dónde sacan</span></div><div class="sec-bd">';
  h+='<div class="kpis" style="max-width:440px">'
    +'<div class="kpi"><div class="v" style="color:'+pctColor(t.serve.acepct*3)+'">'+t.serve.acepct+'%</div><div class="l">Aces</div></div>'
    +'<div class="kpi"><div class="v" style="color:#84cc16">'+(t.serve.venpct||0)+'%</div><div class="l">Vendida (/)</div></div>'
    +'<div class="kpi"><div class="v" style="color:#ef4444">'+t.serve.errpct+'%</div><div class="l">Error</div></div>'
    +'<div class="kpi"><div class="v" style="color:var(--mut2)">'+t.serve.tot+'</div><div class="l">Total</div></div></div>';
  if(t.serve.servers && t.serve.servers.length){
    h+='<div style="overflow-x:auto;display:flex;justify-content:center"><table style="width:auto;min-width:90%;margin:0 auto"><thead><tr><th>Sacador</th><th>Saques</th><th>Ace%</th><th>Err%</th><th style="text-align:left">Tipo</th><th style="text-align:left">Desde</th><th style="text-align:left">Hacia dónde lo pone</th></tr></thead><tbody>';
    t.serve.servers.forEach(function(s){
      var tipo=s.tipo.potencia>=s.tipo.flotado?('Potencia '+s.tipo.potencia+'%'):('Flotado '+s.tipo.flotado+'%');
      var desde=(s.origen||[]).map(function(o){return o.z;}).join(' / ')||'—';
      var hacia=(s.destino||[]).map(function(d){return 'Z'+d.z+' '+d.pct+'%';}).join(' · ')||'—';
      h+='<tr><td><b>'+s.name+'</b></td>'
        +'<td style="color:var(--mut2);font-weight:700">'+s.n+'</td>'
        +'<td style="color:'+pctColor(s.acepct*4)+';font-weight:700">'+s.acepct+'%</td>'
        +'<td style="color:'+(s.errpct>=18?'#ef4444':'#f97316')+'">'+s.errpct+'%</td>'
        +'<td style="text-align:left;color:var(--saque);font-weight:700">'+tipo+'</td>'
        +'<td style="text-align:left;color:var(--mut2)">'+desde+'</td>'
        +'<td style="text-align:left;color:var(--bloqueo,#06B6D4);font-weight:700">'+hacia+'</td></tr>';
    });
    h+='</tbody></table></div>';
    h+='<div style="font-size:10px;color:var(--mut);margin-top:9px;line-height:1.5">Ordenado por cantidad de saques (los primeros son los titulares). <b style="color:var(--mut2)">Desde</b> = zona de la cancha desde la que saca (Z1 derecha · Z6 medio · Z5 izq). <b style="color:var(--mut2)">Hacia dónde</b> = zonas donde más lo pone — preparar la recepción ahí.</div>';
  } else {
    h+='<div style="font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Zonas desde donde sacan</div>';
    t.serve.zones.forEach(function(z){ h+=bar(ZN(z.k),z.pct,'var(--saque)'); });
  }
  h+='</div></div>';

  // ===== ARMADO =====
  h+='<div class="sec"><div class="sec-hd"><span class="sec-ic">🎯</span><span class="sec-ti" style="color:var(--armado)">Armador</span></div><div class="sec-bd">';
  if(t.set.main){
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
      +'<div style="font-family:Bebas Neue;font-size:30px;letter-spacing:1px">'+t.set.main.name+'</div>'
      +'<div class="chip" style="border-color:rgba(129,140,248,.4)"><span class="p" style="color:var(--armado)">'+t.set.main.pct+'%</span> del juego</div></div>';
  }
  if(t.set.calldist_f){
    h+='<div style="font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Qué produce cada llamada</div>';
    h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">'
      +'<select id="cdRq" onchange="renderCalldist()" style="background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer"><option value="all">Toda recepción</option><option value="pos">Con recepción + (#/+)</option><option value="neg">Con recepción − (!/-)</option></select>'
      +'<select id="cdPh" onchange="renderCalldist()" style="background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer"><option value="all">Todo el set</option><option value="e">Inicio (0-8)</option><option value="m">Medio (9-16)</option><option value="l">Final (17+)</option></select>'
      +'</div>';
    h+='<div id="cdOut"></div>';
    h+='<div style="font-size:10px;color:var(--mut);margin-top:8px;line-height:1.5">Filtrá por calidad de recepción y momento del set para ver cómo cambia su distribución. Ej: fuera de sistema (recepción −) suele simplificar a su rematador de confianza. Tocá una llamada en el Game Plan para el heatmap.</div>';
  } else if(t.set.calls && t.set.calls.length){
    h+='<div style="font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px">Llamadas que usa</div><div class="chips">';
    t.set.calls.forEach(function(k){ h+='<div class="chip"><b style="color:var(--armado)">'+k.k+'</b><span class="p" style="color:var(--armado)">'+k.pct+'%</span></div>'; });
    h+='</div>';
  }
  h+='</div></div>';

  // ===== DISTRIBUCIÓN POR ROTACIÓN (al lado del armador) =====
  h+=buildRotDist(t);

  // ===== ATAQUE (ancho completo) — análisis por jugador =====
  h+='<div class="sec" style="grid-column:1/-1"><div class="sec-hd"><span class="sec-ic">💥</span><span class="sec-ti" style="color:var(--ataque)">Ataque — por jugador</span></div><div class="sec-bd">';
  h+='<div class="kpis" style="max-width:520px">'
    +'<div class="kpi"><div class="v" style="font-size:34px;color:'+effColor(t.attack.eff)+'">'+t.attack.eff+'%</div><div class="l">Eficiencia</div></div>'
    +'<div class="kpi"><div class="v" style="font-size:34px;color:#22c55e">'+t.attack.killpct+'%</div><div class="l">Punto</div></div>'
    +'<div class="kpi"><div class="v" style="font-size:34px;color:#06b6d4">'+t.attack.blkpct+'%</div><div class="l">Bloqueados</div></div>'
    +'<div class="kpi"><div class="v" style="font-size:34px;color:#ef4444">'+t.attack.errpct+'%</div><div class="l">Error</div></div>'
    +'<div class="kpi"><div class="v" style="font-size:34px;color:var(--ataque)">'+t.attack.tot+'</div><div class="l">Total</div></div></div>';
  h+='<div class="atktabs"><button class="atktab on" data-m="gen" onclick="renderAtkTab(\'gen\')">General</button>'
    +'<button class="atktab" data-m="so" onclick="renderAtkTab(\'so\')">Side-out (recepción +)</button>'
    +'<button class="atktab" data-m="tr" onclick="renderAtkTab(\'tr\')">Transición</button></div>';
  h+='<div id="atkOut"></div>';
  h+='<div style="font-size:10px;color:var(--mut);margin-top:9px;line-height:1.5"><b style="color:var(--mut2)">General</b> = todos los ataques · <b style="color:var(--mut2)">Side-out</b> = con recepción positiva (#/+), su juego armado · <b style="color:var(--mut2)">Transición</b> = tras defensa, otro tipo de pelota. <b style="color:var(--mut2)">PJ</b> = partidos jugados · ⚠ = muestra chica · Combinación → dirección: Z1 derecha · Z5 izq · Z6/7/8/9 fondo.</div>';
  h+='</div></div>';

  // ===== RECEPCIÓN =====
  h+='<div class="sec" style="grid-column:1/-1"><div class="sec-hd"><span class="sec-ic">🛡</span><span class="sec-ti" style="color:var(--recep)">Recepción — dónde atacarlos con el saque</span></div><div class="sec-bd">';
  h+='<div class="kpis" style="max-width:340px">'
    +'<div class="kpi"><div class="v" style="color:'+pctColor(t.recep.pospct)+'">'+t.recep.pospct+'%</div><div class="l">Positiva (#+)</div></div>'
    +'<div class="kpi"><div class="v" style="color:#ef4444">'+t.recep.errpct+'%</div><div class="l">Error</div></div>'
    +'<div class="kpi"><div class="v" style="color:var(--mut2)">'+t.recep.tot+'</div><div class="l">Total</div></div></div>';
  var rd=(t.recep.detail && t.recep.detail.length)?t.recep.detail:null;
  var tgtName=(t.recep.target&&t.recep.target.name)||'';
  if(rd){
    h+='<table style="margin-top:6px"><thead><tr><th>Receptor (por volumen)</th><th>Rec.</th><th>Positiva%</th><th>vs Flotado</th><th>vs Potencia</th><th style="text-align:left">Recibe peor en</th></tr></thead><tbody>';
    rd.forEach(function(w,i){
      var flo=w.float||{n:0,pospct:0}, spin=w.spin||{n:0,pospct:0};
      var both=flo.n>=15&&spin.n>=15;
      var serveType=both?(flo.pospct<spin.pospct?'flotado':'potencia'):'';
      var floCell='<span style="color:'+pctColor(flo.pospct)+';font-weight:'+(serveType==='flotado'?'800':'400')+'">'+(flo.n?flo.pospct+'%':'—')+'</span>';
      var spinCell='<span style="color:'+pctColor(spin.pospct)+';font-weight:'+(serveType==='potencia'?'800':'400')+'">'+(spin.n?spin.pospct+'%':'—')+'</span>';
      var wz=(w.weakzones||[]).map(function(z){return 'Z'+z.zone+' ('+z.pospct+'%)';}).join(' · ');
      var isTgt=w.name===tgtName;
      h+='<tr'+(isTgt?' style="background:rgba(239,68,68,.07)"':'')+'><td>'+(isTgt?'<span style="color:var(--red)">🎯</span> ':'')+w.name+'</td>'
        +'<td style="color:var(--mut2)">'+w.n+'</td>'
        +'<td style="font-weight:800;color:'+pctColor(w.pospct)+'">'+w.pospct+'%</td>'
        +'<td>'+floCell+'</td><td>'+spinCell+'</td>'
        +'<td style="text-align:left;color:var(--mut2);font-size:12px">'+(wz||'—')+'</td></tr>';
    });
    h+='</tbody></table>';
    h+='<div style="font-size:10px;color:var(--mut);margin-top:9px;line-height:1.5">🎯 = receptor más vulnerable · <b style="color:var(--mut2)">vs Flotado / vs Potencia</b> = su positiva según el tipo de saque (en <b>negrita</b> el que más lo daña: sacarle ESE) · <b style="color:var(--mut2)">Recibe peor en</b> = zonas de su cancha donde recibe más flojo (apuntar el saque ahí)</div>';
  } else if(t.recep.weak && t.recep.weak.length){
    h+='<table style="margin-top:6px"><thead><tr><th>Receptor (de + débil a + fuerte)</th><th>Rec.</th><th>Positiva%</th><th>Error%</th></tr></thead><tbody>';
    t.recep.weak.forEach(function(w,i){
      h+='<tr><td>'+(i===0?'<span style="color:var(--red)">🎯</span> ':'')+w.name+'</td><td style="color:var(--mut2)">'+w.tot+'</td>'
        +'<td style="font-weight:800;color:'+pctColor(w.pospct)+'">'+w.pospct+'%</td>'
        +'<td style="color:#f97316">'+w.errpct+'%</td></tr>';
    });
    h+='</tbody></table>';
  }
  h+='</div></div>';

  h+=renderRotations(t);
  h+=renderSistema(t);
  h+=renderRecepZona(t);
  h+=renderRecepFiltro(t);

  h+='</div>'; // /grid

  // ===== CLAVES DEL PARTIDO =====
  var cl=buildClaves(t);
  if(cl.length){
    h+='<div class="claves"><div class="claves-hd">🔑 Claves del partido</div>';
    cl.forEach(function(x,i){ h+='<div class="clave"><div class="cn">'+(i+1)+'</div><div>'+x+'</div></div>'; });
    h+='</div>';
  }

  d.innerHTML=h;
  if(t.recent && t.recent.funds) renderRecentFund(CUR_FUND);
  if(t.attack && t.attack.players) renderAtkTab('gen');
  if(t.set && t.set.calldist_f) renderCalldist();
  if(t.rotations) renderRotDist(CUR_ROT);
  if(t.sistema && t.sistema.by_zone_f) renderByZone();
  if(t.sistema && t.sistema.receivers && t.sistema.receivers.length) pickReceiver(0);
}

buildTeams();
</script>
<script src="lang.js" onerror="void 0"></script>
<script src="temporadas_menu.js" onerror="void 0"></script>
</body>
